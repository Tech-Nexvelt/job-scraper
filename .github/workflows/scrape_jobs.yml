name: Daily Job Scrape
# Triggered daily and manually

on:
  schedule:
    # Multiple triggers to ensure reliability if GitHub delays one
    - cron: '30 17 * * *' # 11:00 PM IST
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-22.04
    environment: Scraper
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install fastapi uvicorn playwright apscheduler supabase pydantic httpx python-dotenv

      - name: Install Playwright Browsers
        run: playwright install chromium --with-deps

      - name: Run Scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || vars.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY || vars.SUPABASE_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER || vars.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT || vars.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER || vars.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD || vars.SMTP_PASSWORD }}
          ALERT_RECIPIENT: ${{ secrets.ALERT_RECIPIENT || vars.ALERT_RECIPIENT }}
        run: |
          # Use the absolute path to ensure scraper runs correctly
          python -m scraper.run_scraper
